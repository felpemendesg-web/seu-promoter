<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 150" role="img" aria-labelledby="title description">
  <title id="title">Seu Promoter Floripa</title>
  <description id="description">Logo Seu Promoter Floripa em preto sobre fundo amarelo.</description>
  <defs>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffdf35"/>
      <stop offset="0.55" stop-color="#f7d538"/>
      <stop offset="1" stop-color="#edc72a"/>
    </linearGradient>
    <filter id="texture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".035" numOctaves="3" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="softNoise">
        <feFuncA type="table" tableValues="0 .13"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
  </defs>
  <rect width="360" height="150" rx="20" fill="url(#yellow)" filter="url(#texture)"/>
  <g fill="#0b0b0b">
    <text x="180" y="77" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="-1.3">Seu Promoter</text>
    <text x="180" y="116" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="34" font-weight="300" letter-spacing="5.5">floripa</text>
  </g>
  <path d="M89 46c28-13 64-8 93-8 29 0 58-2 86-13-17 17-49 20-83 20-34 0-67-5-96 1Z" fill="#0b0b0b"/>
</svg>
