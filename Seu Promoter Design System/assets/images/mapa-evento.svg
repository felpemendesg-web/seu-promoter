<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#181818" stroke="#333" stroke-width="2"/>
  
  <!-- Ocean/Beach representation at the bottom -->
  <path d="M 0 280 Q 100 270 200 280 T 400 280 L 400 300 L 0 300 Z" fill="#1c3d5a" opacity="0.4"/>
  <text x="200" y="293" fill="#38a169" font-size="10" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="600">JURERÊ INTERNACIONAL</text>

  <!-- PALCO (Stage) -->
  <rect x="140" y="20" width="120" height="40" rx="6" fill="#F7D538" />
  <text x="200" y="45" fill="#111" font-size="14" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="800">PALCO</text>

  <!-- PISTA VIP -->
  <rect x="80" y="80" width="240" height="80" rx="8" fill="none" stroke="#F7D538" stroke-dasharray="4 2" stroke-width="1.5"/>
  <rect x="80" y="80" width="240" height="80" rx="8" fill="#F7D538" opacity="0.05"/>
  <text x="200" y="125" fill="#F7D538" font-size="12" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="700">PISTA VIP</text>

  <!-- CAMAROTES (VIP Boxes) -->
  <!-- Left Camarotes -->
  <rect x="15" y="80" width="50" height="120" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <line x1="15" y1="120" x2="65" y2="120" stroke="#444"/>
  <line x1="15" y1="160" x2="65" y2="160" stroke="#444"/>
  <text x="40" y="145" fill="#fff" font-size="9" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="600" transform="rotate(-90 40 145)">CAMAROTES A</text>

  <!-- Right Camarotes -->
  <rect x="335" y="80" width="50" height="120" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <line x1="335" y1="120" x2="385" y2="120" stroke="#444"/>
  <line x1="335" y1="160" x2="385" y2="160" stroke="#444"/>
  <text x="360" y="145" fill="#fff" font-size="9" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="600" transform="rotate(90 360 145)">CAMAROTES B</text>

  <!-- PISTA COMMON -->
  <rect x="80" y="175" width="240" height="70" rx="8" fill="none" stroke="#888" stroke-width="1"/>
  <text x="200" y="215" fill="#888" font-size="12" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="700">PISTA COMUM</text>

  <!-- BARES (Bars) -->
  <rect x="15" y="215" width="50" height="30" rx="4" fill="#2d3748" stroke="#4a5568"/>
  <text x="40" y="233" fill="#fff" font-size="9" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="600">BAR</text>

  <rect x="335" y="215" width="50" height="30" rx="4" fill="#2d3748" stroke="#4a5568"/>
  <text x="360" y="233" fill="#fff" font-size="9" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="600">BAR</text>

  <!-- BANHEIROS & ENTRADA -->
  <rect x="80" y="255" width="70" height="18" rx="3" fill="#2d2d2d"/>
  <text x="115" y="267" fill="#aaa" font-size="8" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="600">WC</text>

  <rect x="250" y="255" width="70" height="18" rx="3" fill="#2d2d2d"/>
  <text x="285" y="267" fill="#aaa" font-size="8" font-family="Poppins, sans-serif" text-anchor="middle" font-weight="600">ENTRADA</text>
</svg>
