<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova senha — Admin Seu Promoter</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body data-loader-manual="true">
  <!-- PAGE LOADER -->
  <div class="page-loader">
    <div class="page-loader-mark">
      <span class="page-loader-ring" aria-hidden="true"></span>
      <span class="page-loader-badge">S</span>
    </div>
  </div>
  <noscript><style>.page-loader{display:none!important;}</style></noscript>
  <script src="../assets/js/page-loader.js"></script>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="../assets/images/logo-seu-promoter.svg" alt="Seu Promoter">
      </div>

      <div id="loading-state">
        <div class="loading"><div class="spinner"></div>Verificando link…</div>
      </div>

      <div id="invalid-state" style="display:none;">
        <div class="alert alert-error">Este link de recuperação é inválido ou já expirou.</div>
        <a href="forgot-password.html" class="btn btn-secondary" style="width:100%; margin-top:1rem; justify-content:center;">Pedir novo link</a>
      </div>

      <div id="form-state" style="display:none;">
        <h1 class="login-heading">Defina sua nova senha</h1>
        <p class="login-subheading">Escolha uma nova senha para sua conta</p>

        <div class="alert alert-error" id="error-msg" style="display:none;"></div>

        <form id="reset-form">
          <div class="form-group">
            <label class="form-label">Nova Senha</label>
            <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar Senha</label>
            <input type="password" id="confirm" class="form-input" placeholder="Repita a senha" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; padding:0.875rem;" id="reset-btn">
            Salvar Nova Senha
          </button>
        </form>
      </div>

      <div id="success-state" style="display:none; text-align:center;">
        <div class="alert alert-success" style="margin-bottom:1.5rem;">Senha alterada com sucesso! Redirecionando…</div>
        <div class="spinner" style="margin:0 auto;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script>
    function showState(state) {
      document.getElementById('loading-state').style.display = state === 'loading' ? 'block' : 'none';
      document.getElementById('invalid-state').style.display = state === 'invalid' ? 'block' : 'none';
      document.getElementById('form-state').style.display    = state === 'form'    ? 'block' : 'none';
      document.getElementById('success-state').style.display = state === 'success' ? 'block' : 'none';
    }

    let recoveryReady = false;

    db.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryReady = true;
        showState('form');
        if (typeof hidePageLoader === 'function') hidePageLoader();
      }
    });

    // Se o link não for válido (expirado, já usado, ou acesso direto sem token),
    // nenhum evento PASSWORD_RECOVERY chega — mostra estado de erro após um tempo curto.
    setTimeout(() => {
      if (!recoveryReady) {
        showState('invalid');
        if (typeof hidePageLoader === 'function') hidePageLoader();
      }
    }, 2500);

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn      = document.getElementById('reset-btn');
      const errEl    = document.getElementById('error-msg');
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        errEl.textContent = 'As senhas não coincidem.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Salvando…';
      btn.disabled = true;
      errEl.style.display = 'none';

      const { error } = await db.auth.updateUser({ password });

      if (error) {
        errEl.textContent = 'Erro ao salvar senha: ' + error.message;
        errEl.style.display = 'block';
        btn.textContent = 'Salvar Nova Senha';
        btn.disabled = false;
        return;
      }

      showState('success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    });
  </script>
</body>
</html>
