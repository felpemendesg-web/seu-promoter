<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha senha — Admin Seu Promoter</title>
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body data-loader-manual="true">
  <!-- PAGE LOADER -->
  <div class="page-loader">
    <div class="page-loader-mark">
      <span class="page-loader-ring" aria-hidden="true"></span>
      <span class="page-loader-badge">S</span>
    </div>
  </div>
  <noscript><style>.page-loader{display:none!important;}</style></noscript>
  <script src="../assets/js/page-loader.js"></script>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="../assets/images/logo-seu-promoter.svg" alt="Seu Promoter">
      </div>

      <div id="form-state">
        <h1 class="login-heading">Esqueci minha senha</h1>
        <p class="login-subheading">Informe seu email para receber o link de recuperação</p>

        <div class="alert alert-error" id="error-msg" style="display:none"></div>

        <form id="forgot-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-input" placeholder="seu@email.com" required autocomplete="email">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; padding:0.875rem;" id="forgot-btn">
            Enviar Link de Recuperação
          </button>
        </form>
      </div>

      <div id="success-state" style="display:none; text-align:center;">
        <div class="alert alert-success" style="margin-bottom:1rem;">
          Se esse email estiver cadastrado, enviamos um link de recuperação. Confira sua caixa de entrada (e o spam).
        </div>
      </div>

      <div class="login-footer">
        <a href="index.html" style="color: var(--text-dim);">← Voltar ao login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script>
    if (typeof hidePageLoader === 'function') hidePageLoader();

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('forgot-btn');
      const errEl = document.getElementById('error-msg');
      const email = document.getElementById('email').value.trim();

      btn.textContent = 'Enviando…';
      btn.disabled = true;
      errEl.style.display = 'none';

      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/admin/reset-password.html'
      });

      if (error) {
        errEl.textContent = 'Erro ao enviar o link: ' + error.message;
        errEl.style.display = 'block';
        btn.textContent = 'Enviar Link de Recuperação';
        btn.disabled = false;
        return;
      }

      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
    });
  </script>
</body>
</html>
