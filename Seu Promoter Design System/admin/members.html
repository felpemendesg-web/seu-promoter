            <tbody id="members-body">

<!-- Add Member Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <span class="modal-title">Adicionar Membro</span>
      <button class="modal-close" onclick="closeAddModal()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error" id="add-error-msg" style="display:none;"></div>
      <div class="form-group">
        <label class="form-label">Nome Completo</label>
        <input type="text" id="add-name" class="form-input" placeholder="Nome do membro">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="add-email" class="form-input" placeholder="email@exemplo.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" id="add-password" class="form-input" placeholder="Mínimo 6 caracteres" minlength="6" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar Senha</label>
        <input type="password" id="add-confirm" class="form-input" placeholder="Repita a senha" autocomplete="new-password">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancelar</button>
      <button class="btn btn-primary" id="add-btn" onclick="addMember()">Adicionar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script>
let currentMemberId = null;
let membersById = {};

(async () => {
  const auth = await checkAuth();
  if (!auth) return;
  currentMemberId = auth.member.id;
  setUserInfo(auth.member);
  initMobileToggle();
  await loadMembers();
})();

async function loadMembers() {
  const { data: members } = await db.from('panel_members').select('*').order('created_at');
  const tbody = document.getElementById('members-body');

  membersById = {};
  if (!members || members.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><h3>Nenhum membro</h3></div></td></tr>`;
    return;
  }

  members.forEach(m => { membersById[m.id] = m; });

  tbody.innerHTML = members.map(m => `
    <tr>
      <td>
        <div class="icon-cell">
          <div class="sidebar-avatar" style="width:36px;height:36px;font-size:0.8rem;">${esc(m.name.charAt(0).toUpperCase())}</div>
          <span class="fw-600">${esc(m.name)}${m.id === currentMemberId ? ' <span style="color:var(--text-dim);font-size:0.75rem;font-weight:400;">(você)</span>' : ''}</span>
        </div>
      </td>
      <td class="text-muted text-sm">${esc(m.email)}</td>
      <td class="text-muted text-sm">${new Date(m.created_at).toLocaleDateString('pt-BR')}</td>
      <td>
        ${m.id !== currentMemberId ? `
        <div class="actions-cell">
          <button class="btn btn-icon btn-danger" title="Remover membro" data-action="remove" data-id="${esc(m.id)}">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>` : ''}
      </td>
    </tr>
  `).join('');
}

document.getElementById('members-body').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const m = membersById[btn.dataset.id];
  if (!m) return;
  if (btn.dataset.action === 'remove') removeMember(m.id, m.name);
});

function openAddModal() {
  document.getElementById('add-name').value = '';
  document.getElementById('add-email').value = '';
  document.getElementById('add-password').value = '';
  document.getElementById('add-confirm').value = '';
  document.getElementById('add-error-msg').style.display = 'none';
  document.getElementById('add-btn').disabled = false;
  document.getElementById('add-btn').textContent = 'Adicionar';
  document.getElementById('add-modal').classList.add('open');
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

async function addMember() {
  const btn   = document.getElementById('add-btn');
  const errEl = document.getElementById('add-error-msg');
  const name     = document.getElementById('add-name').value.trim();
  const email    = document.getElementById('add-email').value.trim();
  const password = document.getElementById('add-password').value;
  const confirm  = document.getElementById('add-confirm').value;

  errEl.style.display = 'none';

  if (!name) { errEl.textContent = 'Informe o nome do membro.'; errEl.style.display = 'block'; return; }
  if (!email) { errEl.textContent = 'Informe o email do membro.'; errEl.style.display = 'block'; return; }
  if (password.length < 6) { errEl.textContent = 'A senha precisa ter no mínimo 6 caracteres.'; errEl.style.display = 'block'; return; }
  if (password !== confirm) { errEl.textContent = 'As senhas não coincidem.'; errEl.style.display = 'block'; return; }

  btn.textContent = 'Adicionando…';
  btn.disabled = true;

  const { data, error } = await db.functions.invoke('create-admin-member', {
    body: { name, email, password },
  });

  if (error) {
    // Em erro (status != 2xx), o corpo JSON da função vem em error.context, não em data.
    let code, message;
    try {
      if (error.context && typeof error.context.json === 'function') {
        const payload = await error.context.json();
        code = payload?.error;
        message = payload?.message;
      }
    } catch {}

    const messages = {
      email_in_use: 'Esse email já está cadastrado.',
      invalid_email: 'Email inválido.',
      weak_password: 'A senha precisa ter no mínimo 6 caracteres.',
      name_required: 'Informe o nome do membro.',
      forbidden: 'Você não tem permissão para adicionar membros.',
      not_authenticated: 'Sessão expirada. Faça login novamente.',
    };
    errEl.textContent = messages[code] || message || 'Erro ao adicionar membro.';
    errEl.style.display = 'block';
    btn.textContent = 'Adicionar';
    btn.disabled = false;
    return;
  }

  showToast(`${name} foi adicionado ao painel.`);
  closeAddModal();
  await loadMembers();
}

async function removeMember(id, name) {
  if (!confirm(`Remover "${name}" do painel? O acesso será revogado.`)) return;

  const { error } = await db.from('panel_members').delete().eq('id', id);
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }

  showToast(`${name} foi removido do painel.`);
  await loadMembers();
}

document.getElementById('add-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('add-modal')) closeAddModal();
});
</script>
</body>
</html>
