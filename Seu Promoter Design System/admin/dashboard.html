<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin Seu Promoter</title>
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/images/favicon.svg">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body data-loader-manual="true">
  <!-- PAGE LOADER -->
  <div class="page-loader">
    <div class="page-loader-mark">
      <span class="page-loader-ring" aria-hidden="true"></span>
      <span class="page-loader-badge">S</span>
    </div>
  </div>
  <noscript><style>.page-loader{display:none!important;}</style></noscript>
  <script src="../assets/js/page-loader.js"></script>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="../assets/images/logo-seu-promoter.svg" alt="Seu Promoter">
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Menu</span>
      <a href="dashboard.html" class="nav-item active">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="events.html" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Eventos
      </a>
      <a href="categories.html" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        Categorias
      </a>
      <a href="banners.html" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
        Banners
      </a>
      <a href="members.html" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Membros
      </a>
      <span class="nav-section-label">Site</span>
      <a href="../index.html" target="_blank" class="nav-item">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ver Site
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name">Carregando…</div>
          <div class="sidebar-user-role" id="sidebar-user-role"></div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" style="width:100%;" onclick="logout()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <div class="sidebar-backdrop" id="backdrop"></div>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-left">
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Menu">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1>Dashboard</h1>
      </div>
    </div>

    <div class="admin-content">
      <!-- Stats -->
      <div class="stats-grid" id="stats">
        <div class="stat-card"><div class="spinner" style="margin:0 auto"></div></div>
        <div class="stat-card"><div class="spinner" style="margin:0 auto"></div></div>
        <div class="stat-card"><div class="spinner" style="margin:0 auto"></div></div>
        <div class="stat-card"><div class="spinner" style="margin:0 auto"></div></div>
      </div>

      <!-- Recent events -->
      <div class="section-header">
        <h2>Eventos Recentes</h2>
        <a href="events.html" class="btn btn-secondary btn-sm">Ver todos</a>
      </div>

      <div class="table-card">
        <div class="table-wrapper">
          <table id="recent-events-table">
            <thead>
              <tr>
                <th>Evento</th>
                <th>Data</th>
                <th>Categoria</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="recent-events-body">
              <tr><td colspan="4"><div class="loading"><div class="spinner"></div> Carregando…</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script>
(async () => {
  const auth = await checkAuth();
  if (!auth) return;
  setUserInfo(auth.member);
  initMobileToggle();
  await loadStats();
  await loadRecentEvents();
})();

async function loadStats() {
  const [
    { count: eventsCount },
    { count: categoriesCount },
    { count: bannersCount },
    { count: membersCount }
  ] = await Promise.all([
    db.from('events').select('*', { count: 'exact', head: true }),
    db.from('categories').select('*', { count: 'exact', head: true }),
    db.from('banners').select('*', { count: 'exact', head: true }),
    db.from('panel_members').select('*', { count: 'exact', head: true })
  ]);

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon yellow">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="stat-label">Eventos</div>
      <div class="stat-value">${eventsCount ?? 0}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
      </div>
      <div class="stat-label">Categorias</div>
      <div class="stat-value">${categoriesCount ?? 0}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
      </div>
      <div class="stat-label">Banners</div>
      <div class="stat-value">${bannersCount ?? 0}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      </div>
      <div class="stat-label">Membros</div>
      <div class="stat-value">${membersCount ?? 0}</div>
    </div>
  `;
}

async function loadRecentEvents() {
  const { data: events } = await db
    .from('events')
    .select('*, categories(name)')
    .order('created_at', { ascending: false })
    .limit(8);

  const tbody = document.getElementById('recent-events-body');

  if (!events || events.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><p>Nenhum evento cadastrado ainda.</p><a href="events.html" class="btn btn-primary btn-sm">Adicionar Evento</a></div></td></tr>`;
    return;
  }

  tbody.innerHTML = events.map(ev => `
    <tr>
      <td><span class="fw-600">${ev.title}</span></td>
      <td class="text-muted">${ev.date ? new Date(ev.date + 'T00:00:00').toLocaleDateString('pt-BR') : '—'}</td>
      <td class="text-muted">${ev.categories?.name ?? '—'}</td>
      <td>${ev.active ? '<span class="badge badge-active">Ativo</span>' : '<span class="badge badge-inactive">Inativo</span>'}</td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
